version: '3.8'

services:
  user-identity-service:
    build:
      context: ..
      dockerfile: services/user-identity-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=logistics_identity_db
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_HOST}:9092
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PASETO_SECRET_KEY=${PASETO_SECRET_KEY}
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - logistics-network

  inventory-service:
    build:
      context: ..
      dockerfile: services/inventory-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=logistics_inventory_db
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_HOST}:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - logistics-network

  warehouse-service:
    build:
      context: ..
      dockerfile: services/warehouse-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=logistics_warehouse_db
    depends_on:
      - postgres
    networks:
      - logistics-network

  order-management-service:
    build:
      context: ..
      dockerfile: services/order-management-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=logistics_orders_db
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_HOST}:9092
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      - postgres
      - kafka
      - redis
    networks:
      - logistics-network

  procurement-service:
    build:
      context: ..
      dockerfile: services/procurement-service/Dockerfile
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=logistics_procurement_db
    depends_on:
      - postgres
    networks:
      - logistics-network

  notification-service:
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=logistics_notification_db
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_HOST}:9092
    depends_on:
      - postgres
      - kafka
    networks:
      - logistics-network

  reporting-service:
    build:
      context: ..
      dockerfile: services/reporting-service/Dockerfile
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=logistics_reporting_db
    depends_on:
      - postgres
    networks:
      - logistics-network

  rag-service:
    build:
      context: ../services/rag-service
      dockerfile: Dockerfile
    ports:
      - "8088:8088"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=logistics_rag_db
    depends_on:
      - postgres
    networks:
      - logistics-network

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - logistics-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - logistics-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - logistics-network

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - logistics-network

networks:
  logistics-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
