[railway]
  service = "logistics-backend"
  builder = "dockerfile"
  dockerfilePath = "infrastructure/railway/Dockerfile"

[railway.variables]
  DB_HOST = "${DB_HOST}"
  DB_PORT = "5432"
  DB_PASSWORD = "${DB_PASSWORD}"
  REDIS_HOST = "${REDIS_HOST}"
  REDIS_PASSWORD = "${REDIS_PASSWORD}"
  KAFKA_HOST = "${KAFKA_HOST}"
  PASETO_SECRET_KEY = "${PASETO_SECRET_KEY}"

[deployment]
  region = "us-east-1"
  numReplicas = 1
