spring:
  application:
    name: procurement-service
  datasource:
    url: jdbc:postgresql://localhost:5432/logistics_procurement_db
    username: postgres
    password: ${DB_PASSWORD:Daily2020.}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
    consumer:
      group-id: procurement-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.logistics.*"
server:
  port: 8085
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      service: procurement-service
logging:
  level:
    com.logistics: DEBUG
paseto:
  secret-key: ${PASETO_SECRET_KEY:logistics-local-secret-key-32chars!!}
resilience4j:
  circuitbreaker:
    instances:
      kafkaProducer:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
services:
  inventory:
    base-url: http://localhost:8082
  warehouse:
    base-url: http://localhost:8083
  orders:
    base-url: http://localhost:8084
  reporting:
    base-url: http://localhost:8087
