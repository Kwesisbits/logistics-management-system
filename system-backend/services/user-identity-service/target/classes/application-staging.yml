spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: user_identity

  flyway:
    enabled: true
    schemas: user_identity
    create-schemas: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: SCRAM-SHA-512
      sasl.jaas.config: org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_API_KEY}" password="${KAFKA_API_SECRET}";
      ssl.endpoint.identification.algorithm: https

  data:
    redis:
      host: ${REDIS_HOST:eager-ox-95063.upstash.io}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

server:
  port: 8081

management:
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.logistics: INFO
    org.springframework.security: INFO

paseto:
  secret-key: ${PASETO_SECRET_KEY}
  access-token-expiry-seconds: ${PASETO_ACCESS_TOKEN_EXPIRY_SECONDS:3600}
  refresh-token-expiry-seconds: ${PASETO_REFRESH_TOKEN_EXPIRY_SECONDS:604800}
