spring:
  application:
    name: user-identity-service

  datasource:
    url: jdbc:postgresql://localhost:5432/logistics_identity_db
    username: postgres
    password: ${DB_PASSWORD:Daily2020.}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
      jakarta:
        persistence:
          query:
            timeout: 5000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password: logistics_redis_local
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      service: user-identity-service

logging:
  level:
    com.logistics: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

paseto:
  secret-key: ${PASETO_SECRET_KEY:logistics-local-secret-key-32chars!!}
  access-token-expiry-seconds: 3600
  refresh-token-expiry-seconds: 86400

resilience4j:
  circuitbreaker:
    instances:
      redisService:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 20s
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
