# DevTools uses a Restart Classloader for application classes and a base loader for dependencies.
# logistics-security-common must load on the same loader as @Configuration beans that reference it
# (e.g. PasetoAuthenticationFilter in SecurityConfig), or introspection can fail. Spring Boot supports
# moving selected JARs onto the restart classpath via restart.include (see "Customizing the classpath").
# Pattern matches the full classpath URL (Windows or POSIX).
restart.include.logisticsSecurityCommon=.*logistics-security-common.*\\.jar
